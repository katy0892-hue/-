<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>排班填報系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#f5f5f5;color:#222;}
.app{font-family:Arial,sans-serif;padding:1rem;max-width:600px;margin:0 auto;}
button{cursor:pointer;font-family:inherit;font-size:13px;padding:6px 14px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;}
button:hover{background:#f0f0f0;}
.btn-blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB;}
.btn-blue:hover{background:#B5D4F4;}
.btn-teal{background:#E1F5EE;color:#085041;border-color:#5DCAA5;}
.btn-red{color:#791F1F;border-color:#F09595;}
.btn-red:hover{background:#FCEBEB;}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:1rem;}
input,select{font-family:inherit;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;outline:none;}
input:focus,select:focus{box-shadow:0 0 0 2px #85B7EB;}
.screen{display:none;}.screen.active{display:block;}
.topbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:1rem;}
.topbar h2{font-size:17px;font-weight:500;color:#222;flex:1;min-width:80px;}
.badge{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;white-space:nowrap;}
.badge-teal{background:#E1F5EE;color:#085041;}
.badge-amber{background:#FAEEDA;color:#633806;}
.badge-gray{background:#f5f5f5;color:#666;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem;}
.stat{background:#f5f5f5;border-radius:8px;padding:10px;text-align:center;}
.stat-lbl{font-size:11px;color:#666;margin-bottom:3px;}
.stat-val{font-size:20px;font-weight:500;color:#222;}
.stat-val.ok{color:#0F6E56;}.stat-val.warn{color:#854F0B;}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid #e8e8e8;}
.tab{padding:8px 14px;font-size:13px;border:none;background:transparent;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;}
.tab.active{color:#0C447C;border-bottom-color:#378ADD;font-weight:500;}
.tsec{display:none;}.tsec.active{display:block;}
.progress-bar{height:5px;border-radius:3px;background:#e8e8e8;}
.progress-fill{height:5px;border-radius:3px;}
.toggle-btn{display:inline-flex;align-items:center;justify-content:center;font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid #ccc;background:#f5f5f5;color:#888;}
.toggle-btn.on-am{background:#E1F5EE;color:#085041;border-color:#5DCAA5;font-weight:500;}
.toggle-btn.on-pm{background:#FAEEDA;color:#633806;border-color:#FAC775;font-weight:500;}
.day-list-row{display:flex;align-items:center;gap:0;padding:10px 0;border-bottom:1px solid #f0f0f0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.day-list-row:last-child{border-bottom:none;}
.day-list-row:active{background:#f9f9f9;}
.day-date{width:46px;flex-shrink:0;font-size:12px;color:#666;line-height:1.5;text-align:center;}
.day-date.we{color:#A32D2D;}
.day-slots{flex:1;display:flex;flex-direction:column;gap:4px;}
.slot-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;padding:3px 8px;border-radius:6px;font-weight:500;}
.slot-tag.am{background:#E1F5EE;color:#085041;}
.slot-tag.pm{background:#FAEEDA;color:#633806;}
.slot-tag.empty{background:#f5f5f5;color:#aaa;font-weight:400;}
.day-gap{display:flex;flex-direction:column;gap:3px;margin-left:8px;width:80px;flex-shrink:0;}
.gap-pill{font-size:11px;padding:2px 6px;border-radius:4px;text-align:center;white-space:nowrap;}
.gap-need{background:#FAEEDA;color:#633806;}
.gap-full{background:#E1F5EE;color:#085041;}
.day-arrow{color:#ccc;font-size:16px;margin-left:6px;flex-shrink:0;}
.modal-wrap{display:none;position:fixed;top:0;left:0;right:0;bottom:0;align-items:flex-end;justify-content:center;background:rgba(0,0,0,.4);z-index:100;}
.modal-wrap.open{display:flex;}
.modal-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;padding:1.25rem 1rem 1.5rem;border:1px solid #e8e8e8;}
.modal-handle{width:40px;height:4px;border-radius:2px;background:#ccc;margin:0 auto 1rem;}
.modal-title{font-size:16px;font-weight:500;color:#222;margin-bottom:4px;}
.modal-sub{font-size:12px;color:#666;margin-bottom:1rem;}
.modal-gap-row{display:flex;gap:8px;margin-bottom:1rem;}
.modal-gap-pill{flex:1;text-align:center;padding:6px 8px;border-radius:8px;font-size:12px;font-weight:500;}
.slot-section{margin-bottom:1rem;}
.slot-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.slot-header-label{font-size:13px;font-weight:500;color:#222;}
.big-checkbox{width:22px;height:22px;cursor:pointer;accent-color:#1D9E75;flex-shrink:0;}
.time-row{display:flex;gap:8px;align-items:center;margin-top:6px;}
.time-row select{flex:1;font-size:14px;padding:9px 10px;}
.pref-day-row{display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.pref-day-row:last-child{border-bottom:none;}
.overview-row{display:grid;grid-template-columns:46px 1fr;gap:6px;padding:8px 0;border-bottom:1px solid #f0f0f0;}
.overview-row:last-child{border-bottom:none;}
.ov-slots{display:flex;flex-direction:column;gap:5px;}
.ov-slot-row{display:flex;align-items:flex-start;gap:6px;}
.ov-slot-lbl{font-size:11px;font-weight:500;width:28px;flex-shrink:0;padding-top:2px;}
.ov-slot-lbl.am{color:#085041;}.ov-slot-lbl.pm{color:#633806;}
.ov-chips{display:flex;flex-wrap:wrap;gap:3px;flex:1;}
</style>
</head>
<body>
<div class="app">

<div id="scr-login" class="screen active">
  <div style="display:flex;align-items:center;justify-content:center;min-height:320px;">
    <div style="width:100%;max-width:320px;">
      <div style="text-align:center;margin-bottom:1.5rem;">
        <div style="font-size:22px;font-weight:500;color:#222;margin-bottom:4px;">排班填報系統</div>
        <div style="font-size:14px;color:#666;">請選擇身份登入</div>
      </div>
      <div class="card" style="margin:0;">
        <div style="margin-bottom:12px;">
          <div style="font-size:13px;color:#666;margin-bottom:6px;">身份</div>
          <select id="loginRole" style="width:100%;" onchange="onRoleChange()">
            <option value="">-- 請選擇 --</option>
            <option value="admin">管理者</option>
            <optgroup id="staffOpts" label="── 人員 ──"></optgroup>
          </select>
        </div>
        <div id="pwRow" style="display:none;margin-bottom:12px;">
          <div style="font-size:13px;color:#666;margin-bottom:6px;">密碼</div>
          <input type="password" id="pwInput" placeholder="輸入密碼..." style="width:100%;">
        </div>
        <button class="btn-blue" style="width:100%;padding:10px;font-size:15px;" onclick="doLogin()">登入</button>
        <div id="loginErr" style="font-size:13px;color:#A32D2D;margin-top:8px;display:none;">密碼錯誤</div>
      </div>
    </div>
  </div>
</div>

<div id="scr-overview" class="screen">
  <div class="topbar">
    <h2>本月排班總覽</h2>
    <span id="ovMonBadge" class="badge badge-gray"></span>
    <button id="ovActionBtn" class="btn-blue" style="display:none;"></button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="card" style="padding:.75rem 1rem;margin-bottom:.75rem;">
    <div style="font-size:12px;color:#666;margin-bottom:8px;">查看所有人排班及缺額，再前往填寫</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;" id="ovLegend"></div>
  </div>
  <div class="card" style="padding:.75rem 1rem;">
    <div id="ovBody"></div>
  </div>
</div>

<div id="scr-staff" class="screen">
  <div class="topbar">
    <h2 id="staffTitle"></h2>
    <span id="staffMonBadge" class="badge badge-gray"></span>
    <button onclick="goToOv()">← 總覽</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="staffStats"></div>
  <div id="prefHintBar" style="margin-bottom:.75rem;"></div>
  <div class="card" style="padding:.75rem 1rem;">
    <div style="font-size:12px;color:#666;margin-bottom:10px;">點擊任一天填寫排班</div>
    <div id="staffDayList"></div>
  </div>
</div>

<div id="scr-admin" class="screen">
  <div class="topbar">
    <h2>管理者</h2>
    <div style="display:flex;align-items:center;gap:4px;">
      <button onclick="prevM()">&#8249;</button>
      <span id="adminMonLbl" style="font-size:13px;font-weight:500;color:#222;min-width:72px;text-align:center;"></span>
      <button onclick="nextM()">&#8250;</button>
    </div>
    <button class="btn-blue" onclick="doPrint()">列印</button>
    <button onclick="goLogin()">登出</button>
  </div>
  <div class="stat-grid" id="adminStats"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">每日總覽</button>
    <button class="tab" onclick="switchTab('people',this)">人員管理</button>
    <button class="tab" onclick="switchTab('pref',this)">偏好時段</button>
  </div>
  <div id="tab-overview" class="tsec active">
    <div class="card" style="padding:.75rem 1rem;"><div id="adminOv"></div></div>
  </div>
  <div id="tab-people" class="tsec">
    <div class="card" style="padding:.75rem 1rem;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">
        <div style="font-size:13px;font-weight:500;">人員列表</div>
        <div style="display:flex;gap:6px;">
          <input type="text" id="newName" placeholder="新增人員姓名" style="width:130px;">
          <button class="btn-teal" onclick="addStaff()">新增</button>
        </div>
      </div>
      <div id="adminPeople"></div>
    </div>
  </div>
  <div id="tab-pref" class="tsec">
    <div class="card" style="padding:.75rem 1rem;">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px;">每日偏好時段與缺額設定</div>
      <div style="font-size:12px;color:#666;margin-bottom:12px;">啟用偏好時段並設定每天上下午各需幾人（最多 3 人）。</div>
      <div style="display:grid;grid-template-columns:46px 1fr 1fr;gap:6px;margin-bottom:6px;">
        <div style="font-size:11px;color:#aaa;">日期</div>
        <div style="font-size:11px;color:#aaa;">上午</div>
        <div style="font-size:11px;color:#aaa;">下午</div>
      </div>
      <div id="prefGrid"></div>
    </div>
  </div>
</div>

<div id="modalWrap" class="modal-wrap" onclick="closeModalOutside(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-sub" id="modalSub"></div>
    <div class="modal-gap-row" id="modalGapRow"></div>
    <div id="modalBody"></div>
    <button style="width:100%;padding:12px;font-size:15px;margin-top:4px;" class="btn-blue" onclick="closeModal()">完成</button>
  </div>
</div>

</div>
<script>
var ADMIN_PW='1234',TARGET=31,MAX_SLOT=3;
var COLORS=[['#E6F1FB','#0C447C'],['#E1F5EE','#085041'],['#FBEAF0','#72243E'],['#EEEDFE','#3C3489'],['#FAEEDA','#633806'],['#FAECE7','#712B13'],['#EAF3DE','#27500A'],['#FCEBEB','#791F1F']];
var MONTHS=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
var DW='日一二三四五六';
var today=new Date(),vy=today.getFullYear(),vm=today.getMonth();
var currentUser=null;
var state={staff:[{id:1,name:'小明'},{id:2,name:'小華'},{id:3,name:'小美'}],nextId:4,schedule:{},pref:{}};
function pad(n){return n<10?'0'+n:''+n;}
function mkey(){return vy+'-'+pad(vm+1);}
function t2n(t){var p=t.split(':');return +p[0]+ +p[1]/60;}
function calcH(s,e){if(!s||!e)return 0;var h=t2n(e)-t2n(s);if(h<=0)return 0;var os=Math.max(t2n(s),12),oe=Math.min(t2n(e),13);if(oe>os)h-=(oe-os);return Math.max(0,h);}
function genTimes(){var t=[];for(var h=7;h<=20;h++){t.push(pad(h)+':00');if(h<20)t.push(pad(h)+':30');}return t;}
var TIMES=genTimes();
function getPdata(pid){var k=mkey();if(!state.schedule[k])state.schedule[k]={};if(!state.schedule[k][pid])state.schedule[k][pid]={};return state.schedule[k][pid];}
function getPref(d){return state.pref[mkey()+'-'+d]||{am:false,amN:1,pm:false,pmN:1};}
function setPref(d,data){state.pref[mkey()+'-'+d]=data;}
function monthHrs(pid){var dim=new Date(vy,vm+1,0).getDate(),total=0,pd=getPdata(pid);for(var d=1;d<=dim;d++){var day=pd[d];if(!day)continue;if(day.am&&day.ams&&day.ame)total+=calcH(day.ams,day.ame);if(day.pm&&day.pms&&day.pme)total+=calcH(day.pms,day.pme);}return total;}
function slotCount(d,slot){var k=mkey(),n=0;state.staff.forEach(function(p){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(slot==='am'&&day.am&&day.ams&&day.ame&&calcH(day.ams,day.ame)>0)n++;if(slot==='pm'&&day.pm&&day.pms&&day.pme&&calcH(day.pms,day.pme)>0)n++;});return n;}
function gapLabel(d,slot){var pr=getPref(d);var on=slot==='am'?pr.am:pr.pm;if(!on)return null;var need=slot==='am'?pr.amN:pr.pmN;var cur=slotCount(d,slot);var rem=need-cur;if(rem<=0)return{text:'已滿',cls:'gap-full'};return{text:'缺'+rem+'人',cls:'gap-need'};}
function onRoleChange(){var v=document.getElementById('loginRole').value;document.getElementById('pwRow').style.display=v==='admin'?'block':'none';document.getElementById('loginErr').style.display='none';}
function doLogin(){var role=document.getElementById('loginRole').value;if(!role)return;if(role==='admin'){if(document.getElementById('pwInput').value!==ADMIN_PW){document.getElementById('loginErr').style.display='block';return;}currentUser={role:'admin'};showAdmin();}else{var pid=parseInt(role),p=state.staff.find(function(x){return x.id===pid;});if(!p)return;currentUser={role:'staff',pid:pid,name:p.name};showScreen('scr-overview');renderOv('staff');}}
function goLogin(){currentUser=null;document.getElementById('loginRole').value='';document.getElementById('pwInput').value='';document.getElementById('pwRow').style.display='none';document.getElementById('loginErr').style.display='none';showScreen('scr-login');refreshStaffOpts();}
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});document.getElementById(id).classList.add('active');}
function showAdmin(){showScreen('scr-admin');renderAdmin();}
function goToOv(){showScreen('scr-overview');renderOv('staff');}
function refreshStaffOpts(){var og=document.getElementById('staffOpts');og.innerHTML='';state.staff.forEach(function(p){var o=document.createElement('option');o.value=p.id;o.textContent=p.name;og.appendChild(o);});}
function renderOv(from){
  document.getElementById('ovMonBadge').textContent=vy+'年 '+MONTHS[vm];
  var btn=document.getElementById('ovActionBtn');
  if(from==='staff'&&currentUser){btn.style.display='';btn.textContent='填寫排班 →';btn.onclick=function(){showScreen('scr-staff');renderStaff();};}else btn.style.display='none';
  var leg='';state.staff.forEach(function(p,i){leg+='<span style="display:inline-flex;align-items:center;font-size:12px;background:'+COLORS[i%8][0]+';color:'+COLORS[i%8][1]+';padding:2px 8px;border-radius:10px;">'+p.name+'</span>';});
  document.getElementById('ovLegend').innerHTML=leg;
  var dim=new Date(vy,vm+1,0).getDate(),k=mkey(),html='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(vy,vm,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d);
    var amN=[],pmN=[];
    state.staff.forEach(function(p,i){var day=((state.schedule[k]||{})[p.id]||{})[d];if(!day)return;if(day.am&&day.ams&&day.ame&&calcH(day.ams,day.ame)>0)amN.push({p:p,i:i,s:day.ams,e:day.ame});if(day.pm&&day.pms&&day.pme&&calcH(day.pms,day.pme)>0)pmN.push({p:p,i:i,s:day.pms,e:day.pme});});
    var amGap=gapLabel(d,'am'),pmGap=gapLabel(d,'pm');
    var amPref=pr.am?'<span style="font-size:10px;background:#E1F5EE;color:#085041;border:1px solid #5DCAA5;padding:1px 4px;border-radius:3px;margin-right:3px;">偏好</span>':'';
    var pmPref=pr.pm?'<span style="font-size:10px;background:#FAEEDA;color:#633806;border:1px solid #FAC775;padding:1px 4px;border-radius:3px;margin-right:3px;">偏好</span>':'';
    html+='<div class="overview-row"><div style="font-size:12px;color:'+(isWE?'#A32D2D':'#666')+';line-height:1.5;padding-top:2px;text-align:center;">'+(vm+1)+'/'+d+'<br>'+DW[dow]+'</div>';
    html+='<div class="ov-slots"><div class="ov-slot-row"><span class="ov-slot-lbl am">上午</span><div class="ov-chips">'+amPref+(amN.length?amN.map(function(x){return '<span style="display:inline-block;background:'+COLORS[x.i%8][0]+';color:'+COLORS[x.i%8][1]+';border-radius:8px;padding:2px 7px;font-size:11px;font-weight:500;">'+x.p.name+'<span style="font-size:9px;opacity:.7;"> '+x.s+'–'+x.e+'</span></span>';}).join(''):'<span style="font-size:11px;color:#bbb;">—</span>')+(amGap?'<span class="gap-pill '+amGap.cls+'" style="font-size:11px;padding:2px 6px;border-radius:4px;">'+amGap.text+'</span>':'')+'</div></div>';
    html+='<div class="ov-slot-row"><span class="ov-slot-lbl pm">下午</span><div class="ov-chips">'+pmPref+(pmN.length?pmN.map(function(x){return '<span style="display:inline-block;background:'+COLORS[x.i%8][0]+';color:'+COLORS[x.i%8][1]+';border-radius:8px;padding:2px 7px;font-size:11px;font-weight:500;">'+x.p.name+'<span style="font-size:9px;opacity:.7;"> '+x.s+'–'+x.e+'</span></span>';}).join(''):'<span style="font-size:11px;color:#bbb;">—</span>')+(pmGap?'<span class="gap-pill '+pmGap.cls+'" style="font-size:11px;padding:2px 6px;border-radius:4px;">'+pmGap.text+'</span>':'')+'</div></div>';
    html+='</div></div>';
  }
  document.getElementById('ovBody').innerHTML=html;
}
function renderStaff(){
  var p=state.staff.find(function(x){return x.id===currentUser.pid;});if(!p)return;
  document.getElementById('staffTitle').textContent=p.name;
  document.getElementById('staffMonBadge').textContent=vy+'年 '+MONTHS[vm];
  updateStaffStats();
  var dim=new Date(vy,vm+1,0).getDate(),hasPref=false;
  for(var d=1;d<=dim;d++){var pr=getPref(d);if(pr.am||pr.pm){hasPref=true;break;}}
  document.getElementById('prefHintBar').innerHTML=hasPref?'<div class="card" style="padding:.6rem 1rem;margin-bottom:0;"><div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:#666;"><span style="background:#FAEEDA;color:#633806;padding:1px 6px;border-radius:3px;border:1px solid #FAC775;font-size:11px;">金框</span> 為管理者偏好時段，紅色缺額代表還需要人</div></div>':'';
  var pd=getPdata(p.id),html='';
  for(var d=1;d<=dim;d++){
    var dow=new Date(vy,vm,d).getDay(),isWE=dow===0||dow===6,pr=getPref(d);
    var day=pd[d]||{am:false,ams:'09:00',ame:'12:00',pm:false,pms:'13:00',pme:'16:00'};
    var dh=0;if(day.am&&day.ams&&day.ame)dh+=calcH(day.ams,day.ame);if(day.pm&&day.pms&&day.pme)dh+=calcH(day.pms,day.pme);
    var amGap=gapLabel(d,'am'),pmGap=gapLabel(d,'pm');
    html+='<div class="day-list-row" onclick="openDayModal('+p.id+','+d+')">';
    html+='<div class="day-date'+(isWE?' we':'')+'"><div style="font-size:15px;font-weight:500;">'+(vm+1)+'/'+d+'</div><div style="font-size:11px;">'+DW[dow]+'</div></div>';
    html+='<div class="day-slots">';
    if(day.am&&dh>0)html+='<div style="display:flex;align-items:center;gap:5px;"><span class="slot-tag am">上午 '+day.ams+'–'+day.ame+'</span>'+(pr.am?'<span style="font-size:10px;background:#FAEEDA;color:#633806;border:1px solid #FAC775;padding:1px 4px;border-radius:3px;">偏好</span>':'')+'</div>';
    if(day.pm&&dh>0)html+='<div style="display:flex;align-items:center;gap:5px;"><span class="slot-tag pm">下午 '+day.pms+'–'+day.pme+'</span>'+(pr.pm?'<span style="font-size:10px;background:#FAEEDA;color:#633806;border:1px solid #FAC775;padding:1px 4px;border-radius:3px;">偏好</span>':'')+'</div>';
    if(!day.am&&!day.pm)html+='<span class="slot-tag empty">未排班</span>';
    if(dh>0)html+='<span style="font-size:11px;color:#888;">共 '+dh.toFixed(1)+'h</span>';
    html+='</div>';
    html+='<div class="day-gap">';
